version: 2

project_name: moneylover-cli

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: moneylover
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: syahidfrd
      name: homebrew-tap
    homepage: "https://github.com/syahidfrd/moneylover-cli"
    description: "CLI for Money Lover personal finance app"
    license: "MIT"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
